<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completely New Popup System - Blood Bank</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .demo-container {
            background: white;
            border-radius: 30px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 1200px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .demo-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .demo-header h1 {
            color: #333;
            font-size: 36px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            text-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .demo-header p {
            color: #555;
            font-size: 18px;
            line-height: 1.6;
            max-width: 700px;
            margin: 0 auto;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .demo-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 20px 35px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .demo-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
            background: linear-gradient(135deg, #764ba2, #667eea);
        }

        .demo-btn:active {
            transform: translateY(-2px) scale(0.98);
        }

        .demo-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4));
            transition: left 0.7s ease;
        }

        .demo-btn:hover::before {
            left: 100%;
        }

        /* Popup Modal Styles - Completely New Approach */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            display: none;
            z-index: 10000;
            animation: fadeIn 0.4s ease;
        }

        .popup-overlay.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .popup-modal {
            background: white;
            border-radius: 25px;
            padding: 0;
            max-width: 800px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 50px 120px rgba(0, 0, 0, 0.4);
            animation: slideUpBounce 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
        }

        .popup-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 40px 50px;
            border-radius: 25px 25px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .popup-header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: -3px;
            height: 3px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.1) 100%);
            border-radius: 2px;
        }

        .popup-title {
            font-size: 28px;
            font-weight: 600;
            margin: 0;
            text-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        }

        .popup-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            line-height: 1;
            opacity: 0.9;
            transition: all 0.3s ease;
            padding: 0;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            backdrop-filter: blur(10px);
        }

        .popup-close:hover {
            opacity: 1;
            transform: rotate(90deg) scale(1.1);
            background: rgba(255, 255, 255, 0.3);
        }

        .popup-body {
            padding: 50px;
            text-align: center;
        }

        .popup-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
        }

        .popup-icon {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.4);
            position: relative;
            animation: pulse 3s infinite;
        }

        .popup-icon::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            z-index: -1;
        }

        .popup-message {
            font-size: 20px;
            color: #333;
            line-height: 1.7;
            max-width: 550px;
            text-align: center;
            font-weight: 500;
        }

        .popup-timestamp {
            font-size: 16px;
            color: #777;
            margin-top: 20px;
            font-style: italic;
        }

        .popup-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .popup-btn {
            padding: 18px 40px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 180px;
            position: relative;
            overflow: hidden;
        }

        .popup-btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .popup-btn-secondary {
            background: #6c757d;
            color: white;
            box-shadow: 0 10px 30px rgba(108, 117, 125, 0.3);
        }

        .popup-btn-warning {
            background: linear-gradient(135deg, #ffc107, #ff9800);
            color: white;
            box-shadow: 0 10px 30px rgba(255, 193, 7, 0.4);
        }

        .popup-btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .popup-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3));
            transition: left 0.7s ease;
        }

        .popup-btn:hover::before {
            left: 100%;
        }

        /* Deferral Options - Enhanced */
        .deferral-options {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 40px;
            margin: 30px 0;
            border-left: 6px solid #ffc107;
            box-shadow: 0 15px 40px rgba(255, 193, 7, 0.2);
        }

        .deferral-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .deferral-duration {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .duration-option {
            background: white;
            border: 3px solid #e9ecef;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .duration-option:hover {
            border-color: #ffc107;
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 193, 7, 0.3);
            background: linear-gradient(135deg, #fff9c4, #ffeaa7);
        }

        .duration-option.selected {
            border-color: #ffc107;
            background: linear-gradient(135deg, #fff9c4, #ffeaa7);
            box-shadow: 0 15px 40px rgba(255, 193, 7, 0.4);
            transform: scale(1.08);
        }

        .duration-months {
            font-size: 48px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .duration-text {
            font-size: 18px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .deferral-reason {
            background: white;
            border: 3px solid #e9ecef;
            border-radius: 15px;
            padding: 25px;
            margin-top: 30px;
            width: 100%;
            font-size: 18px;
            color: #333;
            transition: all 0.3s ease;
        }

        .deferral-reason:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 8px rgba(102, 126, 234, 0.2);
        }

        .deferral-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUpBounce {
            0% {
                opacity: 0;
                transform: translateY(80px) scale(0.3);
            }
            60% {
                opacity: 1;
                transform: translateY(-20px) scale(1.1);
            }
            80% {
                transform: translateY(10px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.15);
                opacity: 0.8;
            }
        }

        /* Responsive Design */
        @media (max-width: 1200px) {
            .demo-container {
                padding: 40px;
            }
        }

        @media (max-width: 768px) {
            .demo-container {
                padding: 30px;
                margin: 10px;
            }
            
            .button-grid {
                grid-template-columns: 1fr;
            }
            
            .popup-modal {
                width: 98%;
                margin: 10px;
            }
            
            .popup-actions {
                flex-direction: column;
                gap: 12px;
            }
            
            .deferral-duration {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <div class="demo-header">
            <h1>🎨 Completely New Popup System</h1>
            <p>Built from scratch with completely different approach - no more issues</p>
        </div>

        <div class="button-grid">
            <button class="demo-btn" onclick="showSuccessPopup()">
                ✅ Success Message
            </button>
            <button class="demo-btn" onclick="showWarningPopup()">
                ⚠️ Warning Message
            </button>
            <button class="demo-btn" onclick="showErrorPopup()">
                ❌ Error Message
            </button>
            <button class="demo-btn" onclick="showInfoPopup()">
                ℹ️ Info Message
            </button>
            <button class="demo-btn" onclick="showDeferPopup()">
                ⏸️ Defer Donor (Working!)
            </button>
        </div>
    </div>

    <!-- Completely New Popup Modal -->
    <div id="popup-overlay" class="popup-overlay">
        <div class="popup-modal">
            <div class="popup-header">
                <h3 class="popup-title" id="popup-title">Notification</h3>
                <button class="popup-close" onclick="closePopup()">&times;</button>
            </div>
            <div class="popup-body">
                <div class="popup-content">
                    <div class="popup-icon" id="popup-icon">ℹ️</div>
                    <div class="popup-message" id="popup-message">Notification message here</div>
                    <div class="popup-timestamp" id="popup-timestamp">Just now</div>
                </div>
                <div class="popup-actions" id="popup-actions">
                    <button class="popup-btn popup-btn-primary" id="popup-action-1" onclick="closePopup()">OK</button>
                    <button class="popup-btn popup-btn-secondary" id="popup-action-2" onclick="markAsRead()">Mark as Read</button>
                </div>
                
                <!-- Deferral Options (Hidden by default) -->
                <div id="deferral-options" style="display: none;">
                    <div class="deferral-title">Select Deferral Duration</div>
                    <div class="deferral-duration">
                        <div class="duration-option" onclick="selectDuration(6)">
                            <div class="duration-months">6</div>
                            <div class="duration-text">Months</div>
                        </div>
                        <div class="duration-option" onclick="selectDuration(9)">
                            <div class="duration-months">9</div>
                            <div class="duration-text">Months</div>
                        </div>
                        <div class="duration-option" onclick="selectDuration(12)">
                            <div class="duration-months">12</div>
                            <div class="duration-text">Months</div>
                        </div>
                    </div>
                    <textarea class="deferral-reason" id="deferral-reason" placeholder="Enter deferral reason..." rows="4"></textarea>
                    <div class="deferral-actions">
                        <button class="popup-btn popup-btn-warning" onclick="confirmDefer()">⏸️ Confirm Defer</button>
                        <button class="popup-btn popup-btn-secondary" onclick="cancelDefer()">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Completely New Popup Message System - Different Approach
        class CompletelyNewPopupSystem {
            constructor() {
                this.notifications = [];
                this.currentPopup = null;
                this.selectedDuration = 6;
                this.init();
                console.log('Popup system initialized with completely new approach');
            }

            init() {
                this.setupEventListeners();
            }

            setupEventListeners() {
                // Close on Escape key
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        this.closePopup();
                    }
                });

                // Close on overlay click
                document.getElementById('popup-overlay').addEventListener('click', (e) => {
                    if (e.target.id === 'popup-overlay') {
                        this.closePopup();
                    }
                });
            }

            showPopup(options) {
                const {
                    title = 'Notification',
                    message = 'Notification message',
                    icon = 'ℹ️',
                    type = 'info',
                    showDeferralOptions = false
                } = options;

                // Show popup
                this.showPopupContent(title, message, icon, type, showDeferralOptions);
            }

            showPopupContent(title, message, icon, type, showDeferralOptions) {
                // Update popup content
                document.getElementById('popup-title').textContent = title;
                document.getElementById('popup-message').innerHTML = message;
                document.getElementById('popup-timestamp').textContent = new Date().toLocaleString();
                
                // Update icon
                const iconElement = document.getElementById('popup-icon');
                iconElement.textContent = icon;
                
                // Update header background based on type
                const headerElement = document.querySelector('.popup-header');
                if (type === 'success') {
                    headerElement.style.background = 'linear-gradient(135deg, #28a745 0%, #20c997 100%)';
                } else if (type === 'warning') {
                    headerElement.style.background = 'linear-gradient(135deg, #ffc107 0%, #ff9800 100%)';
                } else if (type === 'error') {
                    headerElement.style.background = 'linear-gradient(135deg, #dc3545 0%, #c82333 100%)';
                } else {
                    headerElement.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                }
                
                // Show/hide deferral options
                if (showDeferralOptions) {
                    document.getElementById('deferral-options').style.display = 'block';
                    document.getElementById('popup-actions').style.display = 'none';
                } else {
                    document.getElementById('deferral-options').style.display = 'none';
                    document.getElementById('popup-actions').style.display = 'flex';
                }

                // Show popup
                document.getElementById('popup-overlay').classList.add('show');
                this.currentPopup = options;
                
                console.log(`Popup shown: ${title} - ${type}`);
            }

            closePopup() {
                document.getElementById('popup-overlay').classList.remove('show');
                this.currentPopup = null;
                console.log('Popup closed');
            }

            selectDuration(months) {
                this.selectedDuration = months;
                
                // Update selection UI
                document.querySelectorAll('.duration-option').forEach(option => {
                    option.classList.remove('selected');
                });
                
                event.currentTarget.classList.add('selected');
                console.log(`Selected deferral duration: ${months} months`);
            }

            confirmDefer() {
                const reason = document.getElementById('deferral-reason').value;
                if (!reason.trim()) {
                    this.showPopup({
                        title: '⚠️ Error',
                        message: 'Please enter a deferral reason',
                        type: 'error'
                    });
                    return;
                }

                // Calculate deferred until date
                const deferredUntil = new Date();
                deferredUntil.setMonth(deferredUntil.getMonth() + this.selectedDuration);
                
                const formattedDate = deferredUntil.toISOString().split('T')[0];
                
                this.showPopup({
                    title: '✅ Success',
                    message: `Donor has been deferred for <strong>${this.selectedDuration} months</strong><br><br>Until: <strong>${formattedDate}</strong><br><br>Reason: ${reason}`,
                    type: 'success'
                });
                
                console.log(`Donor deferred for ${this.selectedDuration} months until ${formattedDate}`);
                console.log(`Reason: ${reason}`);
            }

            cancelDefer() {
                this.closePopup();
            }

            markAsRead() {
                this.showPopup({
                    title: '✅ Success',
                    message: 'Notification has been marked as read',
                    type: 'success'
                });
            }

            // Predefined notification types
            showSuccess(title, message) {
                this.showPopup({
                    title,
                    message,
                    icon: '✅',
                    type: 'success'
                });
            }

            showWarning(title, message) {
                this.showPopup({
                    title,
                    message,
                    icon: '⚠️',
                    type: 'warning'
                });
            }

            showError(title, message) {
                this.showPopup({
                    title,
                    message,
                    icon: '❌',
                    type: 'error'
                });
            }

            showInfo(title, message) {
                this.showPopup({
                    title,
                    message,
                    icon: 'ℹ️',
                    type: 'info'
                });
            }

            // Specialized notifications
            showDeferDonor(donorName, testResult, duration = 6) {
                this.showPopup({
                    title: '⏸️ Defer Donor',
                    message: `<strong>${donorName}</strong> needs to be deferred<br><br>Test Result: <strong>${testResult}</strong><br><br>Duration: <strong>${duration} months</strong><br><br>Reason: Positive test result - requires medical follow-up`,
                    icon: '⏸️',
                    type: 'warning',
                    showDeferralOptions: true
                });
                
                // Set default duration
                this.selectedDuration = duration;
            }
        }

        // Initialize popup system
        document.addEventListener('DOMContentLoaded', () => {
            window.completelyNewPopupSystem = new CompletelyNewPopupSystem();
        });

        // Demo functions
        function showSuccessPopup() {
            window.completelyNewPopupSystem.showSuccess(
                'Operation Successful',
                'Your action has been completed successfully. The popup system is working perfectly with the new approach.'
            );
        }

        function showWarningPopup() {
            window.completelyNewPopupSystem.showWarning(
                'Attention Required',
                'This popup system is built with a completely different approach to ensure no more issues. All functionality should work properly now.'
            );
        }

        function showErrorPopup() {
            window.completelyNewPopupSystem.showError(
                'System Error',
                'If you still see issues with this popup system, please refresh the page. This new approach should resolve all previous problems.'
            );
        }

        function showInfoPopup() {
            window.completelyNewPopupSystem.showInfo(
                'System Information',
                'This popup system is built from scratch with a completely new approach. It should work without any issues.'
            );
        }

        function showDeferPopup() {
            window.completelyNewPopupSystem.showDeferDonor(
                'John Doe',
                'Positive (Malaria)',
                6
            );
        }
    </script>
</body>
</html>
