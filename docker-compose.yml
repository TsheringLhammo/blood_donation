services:
  web:
    build: .
    container_name: blood_donation_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html/blood_donation
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: blood_donation
      DB_USER: root
      DB_PASS: root
      BTS_APP_SECRET: change-me-in-prod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: blood_donation_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blood_donation
    volumes:
      - db_data:/var/lib/mysql
      - ./database_complete.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5
    container_name: blood_donation_pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 64M
    depends_on:
      - db
    restart: unless-stopped

volumes:
  db_data:
